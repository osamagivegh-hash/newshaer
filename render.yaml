services:
  - type: web
    name: newshaer
    env: node
    plan: free
    buildCommand: npm ci --prefix server && npm ci --prefix client && npm run build --prefix client
    startCommand: npm start --prefix server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@alshaerfamily.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: USE_CLOUDINARY
        value: "false"
      - key: CLOUDINARY_FOLDER
        value: al-shaer-family
      - key: NEWS_FETCH_CRON
        value: "*/5 * * * *"
      - key: NEWS_MAX_ITEMS
        value: "50"
    disk:
      name: uploads
      mountPath: /opt/render/project/src/server/uploads
      sizeGB: 1
